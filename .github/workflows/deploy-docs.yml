name: Notify Docs Portal

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'docs-meta.json'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger portal rebuild
        env:
          GH_TOKEN: ${{ secrets.PORTAL_TOKEN }}
        run: |
          gh api repos/TechGearsInteli/TechGearsInteli.github.io/dispatches \
            --field event_type=docs-deployed
